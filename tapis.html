<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barbu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:        #d4a843;
      --gold-hover:  #e0b84d;
      --gold-glow:   rgba(212,168,67,0.3);
      --gold-dim:    rgba(212,168,67,0.5);
      --bg:          #070c08;
      --text:        rgba(255,255,255,0.88);
      --text-dim:    rgba(255,255,255,0.38);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(ellipse at 50% 35%, rgba(28,75,28,0.55) 0%, transparent 65%),
        radial-gradient(ellipse at center, #0d1a0e 0%, #070c08 100%);
      overflow: hidden;
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    }

    /* Particules déco (cartes flottantes) */
    .deco {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .deco-carte {
      position: absolute;
      width: 36px;
      height: 50px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.025);
      animation: flotte linear infinite;
    }

    @keyframes flotte {
      0%   { transform: translateY(110vh) rotate(var(--r0)); opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 0.4; }
      100% { transform: translateY(-20vh) rotate(var(--r1)); opacity: 0; }
    }

    /* Menu principal */
    .menu {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
      animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.9rem;
    }

    .logo h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(3.5rem, 10vw, 6rem);
      font-weight: 600;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-shadow:
        0 0 80px rgba(212,168,67,0.2),
        0 2px 16px rgba(0,0,0,0.9);
      user-select: none;
    }

    .logo-ornement {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
    }

    .logo-ornement .ligne {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim));
    }

    .logo-ornement .ligne.droite {
      background: linear-gradient(90deg, var(--gold-dim), transparent);
    }

    .logo-ornement .losange {
      width: 5px;
      height: 5px;
      background: var(--gold-dim);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    .logo p {
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.5em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    /* Boutons */
    .boutons {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      align-items: center;
      width: 100%;
      min-width: 260px;
    }

    .btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 1rem 2.8rem;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.22s cubic-bezier(.22,1,.36,1);
      width: 100%;
      max-width: 300px;
      outline: none;
    }

    .btn.primaire {
      background: var(--gold);
      border: none;
      color: #1c1000;
      box-shadow: 0 4px 28px var(--gold-glow);
    }

    .btn.primaire:hover {
      background: var(--gold-hover);
      transform: translateY(-3px);
      box-shadow: 0 8px 36px rgba(212,168,67,0.45);
    }

    .btn.secondaire {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text-dim);
    }

    .btn.secondaire:hover {
      border-color: rgba(255,255,255,0.4);
      color: var(--text);
      background: rgba(255,255,255,0.04);
      transform: translateY(-3px);
    }

    .btn:active { transform: translateY(0) !important; }
  </style>
</head>
<body>

  <!-- Cartes flottantes en arrière-plan -->
  <div class="deco" id="deco"></div>

  <div class="menu">
    <div class="logo">
      <h1>Barbu</h1>
      <div class="logo-ornement">
        <div class="ligne"></div>
        <div class="losange"></div>
        <div class="ligne droite"></div>
      </div>
      <p>Jeu de cartes</p>
    </div>

    <div class="boutons">
      <button class="btn primaire" onclick="heberger()">Héberger une partie</button>
      <button class="btn secondaire" onclick="rejoindre()">Rejoindre une partie</button>
    </div>
  </div>

  <script>
    function heberger() { window.location.href = 'heberger.html'; }
    function rejoindre() { window.location.href = 'rejoindre.html'; }

    // Cartes flottantes
    const deco = document.getElementById('deco');
    for (let i = 0; i < 12; i++) {
      const el = document.createElement('div');
      el.className = 'deco-carte';
      const left  = Math.random() * 100;
      const dur   = 14 + Math.random() * 18;
      const delay = Math.random() * -30;
      const r0    = (Math.random() - 0.5) * 40 + 'deg';
      const r1    = (Math.random() - 0.5) * 40 + 'deg';
      el.style.cssText = `left:${left}%;animation-duration:${dur}s;animation-delay:${delay}s;--r0:${r0};--r1:${r1}`;
      deco.appendChild(el);
    }
  </script>
</body>
</html>
