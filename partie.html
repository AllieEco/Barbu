<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barbu — Partie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #d4a843;
      --gold-glow:  rgba(212,168,67,0.25);
      --gold-dim:   rgba(212,168,67,0.5);
      --bg:         #070c08;
      --card-bg:    rgba(255,255,255,0.04);
      --card-border:rgba(255,255,255,0.08);
      --text:       rgba(255,255,255,0.88);
      --text-dim:   rgba(255,255,255,0.38);
      --error:      rgba(240,100,100,0.9);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(ellipse at 50% 35%, rgba(28,75,28,0.55) 0%, transparent 65%),
        radial-gradient(ellipse at center, #0d1a0e 0%, #070c08 100%);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    }

    .carte {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.8rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 3rem 3.5rem;
      backdrop-filter: blur(24px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
      min-width: 380px;
      text-align: center;
      animation: fadeUp 0.5s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      color: var(--gold);
      user-select: none;
    }

    .separateur {
      width: 50%;
      border: none;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .info-bloc {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      align-items: center;
    }

    .info-label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      user-select: none;
    }

    .info-valeur {
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--text);
      user-select: none;
    }

    .code-cases {
      display: flex;
      gap: 0.4rem;
      justify-content: center;
    }

    .code-case {
      width: 2.2rem;
      height: 2.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--gold);
      background: rgba(212,168,67,0.08);
      border: 1px solid rgba(212,168,67,0.25);
      border-radius: 8px;
    }

    .attente {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .attente .texte {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .joueurs-grille {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .joueur-jeton {
      min-width: 3rem;
      padding: 0.4rem 0.6rem;
      height: auto;
      min-height: 3rem;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.15rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.25);
      transition: all 0.3s ease;
    }

    .joueur-jeton.connecte {
      background: rgba(212,168,67,0.08);
      border-color: rgba(212,168,67,0.3);
      color: var(--gold);
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.35; transform: scale(0.85); }
      50%       { opacity: 1;   transform: scale(1); }
    }

    .point-attente {
      display: inline-flex;
      gap: 0.35rem;
      align-items: center;
    }

    .point-attente span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--gold-dim);
      animation: pulse 1.4s ease-in-out infinite;
    }

    .point-attente span:nth-child(2) { animation-delay: 0.2s; }
    .point-attente span:nth-child(3) { animation-delay: 0.4s; }

    .retour-lien {
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s;
      margin-top: 0.3rem;
    }

    .retour-lien:hover { color: var(--text); }

    .erreur-page {
      font-size: 0.85rem;
      color: var(--error);
      text-align: center;
    }

    /* ── Overlay pseudo ── */
    .pseudo-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      transition: opacity 0.3s;
    }

    .pseudo-overlay.masque {
      opacity: 0;
      pointer-events: none;
    }

    .pseudo-carte {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 2.5rem 3rem;
      backdrop-filter: blur(24px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.7);
      min-width: 320px;
      animation: fadeUp 0.4s cubic-bezier(.22,1,.36,1) both;
    }

    .pseudo-carte h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--gold);
      user-select: none;
    }

    .pseudo-carte p {
      font-size: 0.73rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      text-align: center;
      user-select: none;
    }

    .pseudo-input-wrap {
      position: relative;
      width: 100%;
    }

    .pseudo-input {
      width: 100%;
      font-family: 'Inter', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      text-align: center;
      color: var(--text);
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 0.75rem 2.5rem 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .pseudo-input:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }

    .pseudo-input.erreur-input {
      border-color: rgba(240,100,100,0.6);
      box-shadow: 0 0 0 3px rgba(240,100,100,0.12);
    }

    .pseudo-compteur {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.65rem;
      color: rgba(255,255,255,0.2);
      pointer-events: none;
    }

    .pseudo-erreur {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--error);
      min-height: 1em;
      text-align: center;
    }

    .pseudo-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.76rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.9rem 2rem;
      border-radius: 60px;
      background: var(--gold);
      border: none;
      color: #1c1000;
      cursor: pointer;
      transition: all 0.22s ease;
      width: 100%;
      box-shadow: 0 4px 20px var(--gold-glow);
    }

    .pseudo-btn:hover {
      background: #e0b84d;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(212,168,67,0.4);
    }

    .pseudo-btn:active { transform: translateY(0); }

    .jeton-pseudo {
      font-size: 0.65rem;
      font-weight: 500;
      max-width: 70px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: none;
    }

    .jeton-num { font-size: 0.8rem; font-weight: 400; }

    .joueur-jeton.connecte .jeton-pseudo { display: block; }
    .joueur-jeton.connecte .jeton-num    { display: none; }
  </style>
</head>
<body>
  <!-- Overlay pseudo -->
  <div class="pseudo-overlay" id="pseudoOverlay">
    <div class="pseudo-carte">
      <h2>Votre pseudo</h2>
      <p>Choisissez un nom pour cette partie</p>
      <div class="pseudo-input-wrap">
        <input class="pseudo-input" id="pseudoInput" type="text" maxlength="10"
               placeholder="Ex : Alice" autocomplete="off" />
        <span class="pseudo-compteur" id="pseudoCompteur">0/10</span>
      </div>
      <div class="pseudo-erreur" id="pseudoErreur"></div>
      <button class="pseudo-btn" onclick="validerPseudo()">Entrer dans la partie</button>
    </div>
  </div>

  <div class="carte" id="carte">
    <!-- Contenu injecté par JS -->
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const params  = new URLSearchParams(window.location.search);
    const code    = params.get('code');
    const joueurs = parseInt(params.get('joueurs'), 10);
    const role    = params.get('role') || 'hote';
    const carte   = document.getElementById('carte');

    if (code) document.title = `Barbu — Partie ${code}`;

    if (!code || code.length !== 6 || isNaN(joueurs)) {
      document.getElementById('pseudoOverlay').style.display = 'none';
      carte.innerHTML = `
        <h1>Barbu</h1>
        <p class="erreur-page">Paramètres de partie invalides.</p>
        <a class="retour-lien" href="tapis.html">← Retour à l'accueil</a>
      `;
    } else {
      // ── Salle d'attente ────────────────────────────────────────────
      const casesHTML = code.split('').map(c =>
        `<div class="code-case">${c}</div>`
      ).join('');

      let jetonsHTML = '';
      for (let i = 1; i <= joueurs; i++) {
        jetonsHTML += `
          <div class="joueur-jeton" id="jeton-${i}">
            <span class="jeton-num">${i}</span>
            <span class="jeton-pseudo"></span>
          </div>`;
      }

      carte.innerHTML = `
        <h1>Barbu</h1>
        <hr class="separateur" />
        <div class="info-bloc">
          <span class="info-label">Code de la partie</span>
          <div class="code-cases">${casesHTML}</div>
        </div>
        <div class="info-bloc">
          <span class="info-label">Joueurs attendus</span>
          <span class="info-valeur">${joueurs}</span>
        </div>
        <hr class="separateur" />
        <div class="attente" id="zoneAttente">
          <span class="texte" id="texteAttente">En attente des joueurs</span>
          <div class="point-attente" id="pointsAttente">
            <span></span><span></span><span></span>
          </div>
          <div class="joueurs-grille">${jetonsHTML}</div>
        </div>
        <a class="retour-lien" href="tapis.html">← Quitter la partie</a>
      `;

      // ── Gestion du pseudo ──────────────────────────────────────────
      const pseudoInput    = document.getElementById('pseudoInput');
      const pseudoErreur   = document.getElementById('pseudoErreur');
      const pseudoCompteur = document.getElementById('pseudoCompteur');
      const pseudoOverlay  = document.getElementById('pseudoOverlay');

      pseudoInput.focus();

      pseudoInput.addEventListener('input', () => {
        const n = pseudoInput.value.length;
        pseudoCompteur.textContent = `${n}/10`;
        pseudoCompteur.style.color = n >= 10 ? 'rgba(255,180,80,0.7)' : 'rgba(255,255,255,0.25)';
        pseudoErreur.textContent = '';
        pseudoInput.classList.remove('erreur-input');
      });

      pseudoInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') window.validerPseudo();
      });

      window.validerPseudo = function() {
        const pseudo = pseudoInput.value.trim();
        if (!pseudo) {
          pseudoErreur.textContent = 'Veuillez entrer un pseudo.';
          pseudoInput.classList.add('erreur-input');
          pseudoInput.focus();
          return;
        }

        // Masquer l'overlay et connecter le socket
        pseudoOverlay.classList.add('masque');
        setTimeout(() => pseudoOverlay.style.display = 'none', 300);

        connecterSocket(pseudo);
      }

      // ── Socket.io ──────────────────────────────────────────────────
      function connecterSocket(pseudo) {
        // Sauvegarder le pseudo pour jeu.html
        sessionStorage.setItem('barbu_pseudo', pseudo);

        const socket = io();

        // Mémoriser notre numéro de joueur dès la confirmation du serveur
        socket.on('salle_rejointe', ({ numero }) => {
          sessionStorage.setItem('barbu_mon_numero', numero - 1); // 0-indexé
        });

        if (role === 'hote') {
          socket.emit('creer_partie', { code, joueurs, pseudo });
        } else {
          socket.emit('rejoindre_partie', { code, pseudo });
        }

        // Mise à jour des jetons avec les pseudos
        socket.on('maj_joueurs', ({ pseudos }) => {
          pseudos.forEach((p, i) => {
            const jeton = document.getElementById(`jeton-${i + 1}`);
            if (jeton && p) {
              jeton.classList.add('connecte');
              jeton.querySelector('.jeton-pseudo').textContent = p;
              jeton.title = p;
            }
          });
        });

        // Tous connectés → lancement
        socket.on('tous_connectes', ({ code: c, joueurs: nb, pseudos, joueurCommence }) => {
          document.getElementById('texteAttente').textContent = 'Tous les joueurs sont connectés !';
          document.getElementById('pointsAttente').style.display = 'none';
          sessionStorage.setItem('barbu_pseudos', JSON.stringify(pseudos));
          sessionStorage.setItem('barbu_joueur_commence', joueurCommence);
          setTimeout(() => {
            window.location.href = `jeu.html?code=${c}&joueurs=${nb}`;
          }, 800);
        });

        // Réception de la main distribuée par le serveur
        socket.on('votre_main', ({ main, retirees, parJoueur }) => {
          sessionStorage.setItem('barbu_main',      JSON.stringify(main));
          sessionStorage.setItem('barbu_retirees',  JSON.stringify(retirees));
          sessionStorage.setItem('barbu_par_joueur', parJoueur);
        });

        socket.on('erreur_partie', ({ message }) => {
          document.getElementById('texteAttente').textContent = message;
          document.getElementById('pointsAttente').style.display = 'none';
        });
      }
    }

  </script>
</body>
</html>
