<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barbu — Rejoindre une partie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #d4a843;
      --gold-hover: #e0b84d;
      --gold-glow:  rgba(212,168,67,0.25);
      --gold-dim:   rgba(212,168,67,0.5);
      --bg:         #070c08;
      --card-bg:    rgba(255,255,255,0.04);
      --card-border:rgba(255,255,255,0.08);
      --text:       rgba(255,255,255,0.88);
      --text-dim:   rgba(255,255,255,0.38);
      --error:      rgba(240,100,100,0.9);
      --success:    rgba(100,220,130,0.9);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(ellipse at 50% 35%, rgba(28,75,28,0.55) 0%, transparent 65%),
        radial-gradient(ellipse at center, #0d1a0e 0%, #070c08 100%);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    }

    .carte {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 3rem 3.5rem;
      backdrop-filter: blur(24px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
      min-width: 380px;
      animation: fadeUp 0.5s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      color: var(--gold);
      user-select: none;
    }

    .sous-titre {
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.7;
      user-select: none;
    }

    .cases {
      display: flex;
      gap: 0.6rem;
    }

    .cases input {
      width: 3rem;
      height: 3.8rem;
      text-align: center;
      font-family: 'Inter', sans-serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--text);
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      outline: none;
      caret-color: transparent;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .cases input:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }

    .cases input.rempli {
      border-color: rgba(212,168,67,0.45);
      color: var(--gold);
    }

    .cases input.erreur-case {
      border-color: rgba(240,100,100,0.6);
      box-shadow: 0 0 0 3px rgba(240,100,100,0.15);
      animation: secousse 0.4s ease;
    }

    @keyframes secousse {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-5px); }
      40%     { transform: translateX(5px); }
      60%     { transform: translateX(-4px); }
      80%     { transform: translateX(4px); }
    }

    .feedback {
      font-size: 0.73rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      min-height: 1.2em;
      text-align: center;
      transition: opacity 0.3s;
    }

    .feedback.erreur { color: var(--error); }
    .feedback.succes { color: var(--success); }

    .info-partie {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      padding: 0.9rem 1.4rem;
      background: rgba(212,168,67,0.06);
      border: 1px solid rgba(212,168,67,0.2);
      border-radius: 12px;
      width: 100%;
    }

    .info-partie.visible { display: flex; }

    .info-label {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .info-valeur {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--gold);
    }

    .boutons {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    .btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.76rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.9rem 2rem;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.22s ease;
      outline: none;
      flex: 1;
    }

    .btn.primaire {
      background: var(--gold);
      border: none;
      color: #1c1000;
      box-shadow: 0 4px 20px var(--gold-glow);
    }

    .btn.primaire:hover {
      background: var(--gold-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(212,168,67,0.4);
    }

    .btn:active { transform: translateY(0) !important; }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
    }

    .retour-lien {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      text-decoration: none;
      margin-top: -0.5rem;
      transition: color 0.2s;
    }

    .retour-lien:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="carte">
    <h1>Barbu</h1>
    <p class="sous-titre">Entrez le code de la partie<br>que vous souhaitez rejoindre</p>

    <div class="cases" id="cases">
      <input type="password" inputmode="numeric" maxlength="1" />
      <input type="password" inputmode="numeric" maxlength="1" />
      <input type="password" inputmode="numeric" maxlength="1" />
      <input type="password" inputmode="numeric" maxlength="1" />
      <input type="password" inputmode="numeric" maxlength="1" />
      <input type="password" inputmode="numeric" maxlength="1" />
    </div>

    <div class="feedback" id="feedback"></div>

    <!-- Affiché uniquement si la partie est trouvée -->
    <div class="info-partie" id="infoPartie">
      <span class="info-label">Joueurs dans cette partie</span>
      <span class="info-valeur" id="infoJoueurs">—</span>
    </div>

    <div class="boutons">
      <button class="btn primaire" id="btnRejoindre" onclick="verifierCode()">Rejoindre</button>
    </div>

    <a class="retour-lien" href="tapis.html">← Retour</a>
  </div>

  <script>
    const inputs   = Array.from(document.querySelectorAll('.cases input'));
    const feedback = document.getElementById('feedback');
    const infoPartie  = document.getElementById('infoPartie');
    const infoJoueurs = document.getElementById('infoJoueurs');
    const btnRejoindre = document.getElementById('btnRejoindre');

    let partieEnCours = null; // stocke la partie trouvée avant confirmation

    // ── Gestion des cases ────────────────────────────────────────────
    inputs.forEach((input, i) => {
      input.addEventListener('keydown', e => {
        if (
          !/^\d$/.test(e.key) &&
          !['Backspace','Delete','Tab','ArrowLeft','ArrowRight'].includes(e.key)
        ) { e.preventDefault(); return; }

        if (e.key === 'Backspace') {
          if (input.value === '' && i > 0) {
            inputs[i - 1].value = '';
            inputs[i - 1].classList.remove('rempli','erreur-case');
            inputs[i - 1].focus();
          } else {
            input.value = '';
            input.classList.remove('rempli','erreur-case');
          }
          e.preventDefault();
          reinitialiserFeedback();
        }

        if (e.key === 'ArrowLeft'  && i > 0)              inputs[i - 1].focus();
        if (e.key === 'ArrowRight' && i < inputs.length - 1) inputs[i + 1].focus();
      });

      input.addEventListener('input', () => {
        input.value = input.value.replace(/\D/g,'').slice(-1);
        input.classList.remove('erreur-case');
        reinitialiserFeedback();

        if (input.value !== '') {
          input.classList.add('rempli');
          if (i < inputs.length - 1) inputs[i + 1].focus();
        } else {
          input.classList.remove('rempli');
        }
      });

      input.addEventListener('paste', e => {
        e.preventDefault();
        const chiffres = (e.clipboardData || window.clipboardData)
          .getData('text').replace(/\D/g,'').slice(0, 6);
        chiffres.split('').forEach((c, j) => {
          if (inputs[j]) { inputs[j].value = c; inputs[j].classList.add('rempli'); }
        });
        inputs[Math.min(chiffres.length, inputs.length - 1)].focus();
        reinitialiserFeedback();
      });
    });

    inputs[0].focus();

    function afficherErreur(msg) {
      feedback.textContent = msg;
      feedback.className = 'feedback erreur';
    }

    function reinitialiserFeedback() {
      feedback.textContent = '';
      feedback.className = 'feedback';
      infoPartie.classList.remove('visible');
      partieEnCours = null;
      btnRejoindre.textContent = 'Rejoindre';
    }

    // ── Vérification du code via le serveur ─────────────────────────
    async function verifierCode() {
      if (partieEnCours) { confirmerEntree(); return; }

      const code = inputs.map(inp => inp.value).join('');
      if (code.length < 6) {
        afficherErreur('Veuillez saisir les 6 chiffres du code.');
        inputs.find(inp => inp.value === '')?.focus();
        return;
      }

      btnRejoindre.disabled = true;

      try {
        const res    = await fetch(`/api/partie/${code}`);
        const donnee = await res.json();

        if (!donnee.existe) {
          inputs.forEach(inp => inp.classList.add('erreur-case'));
          afficherErreur('Aucune partie trouvée avec ce code.');
          setTimeout(() => inputs.forEach(inp => inp.classList.remove('erreur-case')), 600);
          btnRejoindre.disabled = false;
          return;
        }

        // Partie trouvée
        partieEnCours = { code, joueurs: donnee.joueurs };
        const restants = donnee.joueurs - donnee.connectes;
        infoJoueurs.textContent = `${donnee.joueurs} joueurs · ${donnee.connectes} déjà connecté${donnee.connectes > 1 ? 's' : ''} · ${restants} place${restants > 1 ? 's' : ''} libre${restants > 1 ? 's' : ''}`;
        infoPartie.classList.add('visible');
        feedback.textContent = 'Partie trouvée !';
        feedback.className = 'feedback succes';
        btnRejoindre.textContent = 'Confirmer et rejoindre';
        btnRejoindre.disabled = false;

      } catch (e) {
        afficherErreur('Impossible de contacter le serveur.');
        btnRejoindre.disabled = false;
      }
    }

    function confirmerEntree() {
      const { code, joueurs } = partieEnCours;
      window.location.href = `partie.html?code=${code}&joueurs=${joueurs}&role=joueur`;
    }

    // Valider avec Entrée
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') verifierCode();
    });
  </script>
</body>
</html>
