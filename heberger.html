<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barbu — Héberger une partie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #d4a843;
      --gold-hover: #e0b84d;
      --gold-glow:  rgba(212,168,67,0.25);
      --gold-dim:   rgba(212,168,67,0.5);
      --bg:         #070c08;
      --card-bg:    rgba(255,255,255,0.04);
      --card-border:rgba(255,255,255,0.08);
      --text:       rgba(255,255,255,0.88);
      --text-dim:   rgba(255,255,255,0.38);
      --error:      rgba(240,100,100,0.9);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(ellipse at 50% 35%, rgba(28,75,28,0.55) 0%, transparent 65%),
        radial-gradient(ellipse at center, #0d1a0e 0%, #070c08 100%);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    }

    .carte {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 3rem 3.5rem;
      backdrop-filter: blur(24px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
      min-width: 380px;
      animation: fadeUp 0.5s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      color: var(--gold);
      user-select: none;
    }

    .sous-titre {
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.7;
      user-select: none;
    }

    /* ── Cases de code ── */
    .cases {
      display: flex;
      gap: 0.6rem;
    }

    .cases input {
      width: 3rem;
      height: 3.8rem;
      text-align: center;
      font-family: 'Inter', sans-serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--text);
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      outline: none;
      caret-color: transparent;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .cases input:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }

    .cases input.rempli {
      border-color: rgba(212,168,67,0.45);
      color: var(--gold);
    }

    /* ── Grille joueurs ── */
    .grille-joueurs {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .nb-btn {
      width: 3.4rem;
      height: 3.4rem;
      font-family: 'Inter', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-dim);
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.18s ease;
      user-select: none;
    }

    .nb-btn:hover {
      border-color: rgba(255,255,255,0.35);
      color: var(--text);
      transform: translateY(-2px);
      background: rgba(255,255,255,0.05);
    }

    .nb-btn.selectionne {
      background: var(--gold-glow);
      border-color: var(--gold-dim);
      color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }

    .nb-btn:active { transform: translateY(0); }

    /* ── Commun ── */
    .erreur {
      font-size: 0.73rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: var(--error);
      min-height: 1.2em;
      text-align: center;
    }

    .boutons {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    .btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.76rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.9rem 2rem;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.22s ease;
      outline: none;
      flex: 1;
    }

    .btn.primaire {
      background: var(--gold);
      border: none;
      color: #1c1000;
      box-shadow: 0 4px 20px var(--gold-glow);
    }

    .btn.primaire:hover {
      background: var(--gold-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(212,168,67,0.4);
    }

    .btn:active { transform: translateY(0) !important; }

    .retour-lien {
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      margin-top: -0.5rem;
      transition: color 0.2s;
      text-decoration: none;
    }

    .retour-lien:hover { color: var(--text); }

    .etape         { display: contents; }
    .etape.masque  { display: none; }
  </style>
</head>
<body>
  <div class="carte" id="carte">
    <h1>Barbu</h1>

    <!-- Étape 1 : définir le code -->
    <div class="etape" id="etape1">
      <p class="sous-titre">Définissez un code à 6 chiffres<br>pour votre partie</p>

      <div class="cases" id="cases">
        <input type="password" inputmode="numeric" maxlength="1" />
        <input type="password" inputmode="numeric" maxlength="1" />
        <input type="password" inputmode="numeric" maxlength="1" />
        <input type="password" inputmode="numeric" maxlength="1" />
        <input type="password" inputmode="numeric" maxlength="1" />
        <input type="password" inputmode="numeric" maxlength="1" />
      </div>

      <div class="erreur" id="erreur1"></div>

      <div class="boutons">
        <button class="btn primaire" onclick="validerCode()">Continuer</button>
      </div>

      <a class="retour-lien" href="tapis.html">← Retour</a>
    </div>

    <!-- Étape 2 : choisir le nombre de joueurs -->
    <div class="etape masque" id="etape2">
      <p class="sous-titre">Combien de joueurs<br>participent à la partie ?</p>

      <div class="grille-joueurs" id="grilleJoueurs"></div>

      <div class="erreur" id="erreur2"></div>

      <div class="boutons">
        <button class="btn primaire" onclick="validerJoueurs()">Créer la partie</button>
      </div>

      <button class="retour-lien" onclick="retourEtape1()">← Retour</button>
    </div>
  </div>

  <script>
    // ── État ──
    let codePartie = '';
    let nbJoueurs = null;

    // ── Étape 1 : gestion des cases de code ──
    const inputs = Array.from(document.querySelectorAll('.cases input'));
    const erreur1 = document.getElementById('erreur1');

    inputs.forEach((input, i) => {
      input.addEventListener('keydown', (e) => {
        if (
          !/^\d$/.test(e.key) &&
          !['Backspace', 'Delete', 'Tab', 'ArrowLeft', 'ArrowRight'].includes(e.key)
        ) {
          e.preventDefault();
          return;
        }

        if (e.key === 'Backspace') {
          if (input.value === '' && i > 0) {
            inputs[i - 1].value = '';
            inputs[i - 1].classList.remove('rempli');
            inputs[i - 1].focus();
          } else {
            input.value = '';
            input.classList.remove('rempli');
          }
          e.preventDefault();
          erreur1.textContent = '';
        }

        if (e.key === 'ArrowLeft' && i > 0) inputs[i - 1].focus();
        if (e.key === 'ArrowRight' && i < inputs.length - 1) inputs[i + 1].focus();
      });

      input.addEventListener('input', () => {
        input.value = input.value.replace(/\D/g, '').slice(-1);
        erreur1.textContent = '';

        if (input.value !== '') {
          input.classList.add('rempli');
          if (i < inputs.length - 1) inputs[i + 1].focus();
        } else {
          input.classList.remove('rempli');
        }
      });

      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const texte = (e.clipboardData || window.clipboardData).getData('text');
        const chiffres = texte.replace(/\D/g, '').slice(0, 6);
        chiffres.split('').forEach((c, j) => {
          if (inputs[j]) {
            inputs[j].value = c;
            inputs[j].classList.add('rempli');
          }
        });
        const suivant = Math.min(chiffres.length, inputs.length - 1);
        inputs[suivant].focus();
      });
    });

    inputs[0].focus();

    function validerCode() {
      const code = inputs.map(inp => inp.value).join('');
      if (code.length < 6) {
        erreur1.textContent = 'Veuillez saisir les 6 chiffres du code.';
        inputs.find(inp => inp.value === '')?.focus();
        return;
      }
      codePartie = code;
      allerEtape2();
    }

    // ── Étape 2 : sélection du nombre de joueurs ──
    const grille = document.getElementById('grilleJoueurs');

    for (let n = 3; n <= 8; n++) {
      const btn = document.createElement('button');
      btn.className = 'nb-btn';
      btn.textContent = n;
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nb-btn').forEach(b => b.classList.remove('selectionne'));
        btn.classList.add('selectionne');
        nbJoueurs = n;
        document.getElementById('erreur2').textContent = '';
      });
      grille.appendChild(btn);
    }

    function validerJoueurs() {
      if (!nbJoueurs) {
        document.getElementById('erreur2').textContent = 'Veuillez choisir un nombre de joueurs.';
        return;
      }

      window.location.href = `partie.html?code=${codePartie}&joueurs=${nbJoueurs}`;
    }

    // ── Navigation entre étapes ──
    function allerEtape2() {
      document.getElementById('etape1').classList.add('masque');
      document.getElementById('etape2').classList.remove('masque');
    }

    function retourEtape1() {
      nbJoueurs = null;
      document.querySelectorAll('.nb-btn').forEach(b => b.classList.remove('selectionne'));
      document.getElementById('erreur2').textContent = '';
      document.getElementById('etape2').classList.add('masque');
      document.getElementById('etape1').classList.remove('masque');
      inputs[inputs.length - 1].focus();
    }

    // Valider avec Entrée selon l'étape active
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      if (!document.getElementById('etape1').classList.contains('masque')) {
        validerCode();
      } else {
        validerJoueurs();
      }
    });
  </script>
</body>
</html>
